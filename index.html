<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Pribadi | Eki Rohimat</title>
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121824; /* Dark slate blue - sangat nyaman di mata */
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-hidden: auto;
            padding: 20px;
        }

        /* Animasi Fade In Utama */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Card Container */
        .profile-card {
            background: #1e293b; /* Lapisan warna kontras lembut */
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 1s ease-out;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Efek Hover Interaktif pada Kartu */
        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(14, 165, 233, 0.15);
            border-color: #38bdf8;
        }

        /* Avatar Placeholder / Bingkai Foto */
        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 3px solid #38bdf8; /* Aksen warna cyan lembut */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
            transition: transform 0.5s ease;
        }

        .profile-card:hover .avatar {
            transform: rotate(360deg);
        }

        /* Typography */
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .tag {
            display: inline-block;
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 24px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .bio {
            font-size: 0.95rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        /* Action Button / Link */
        .btn-contact {
            display: inline-block;
            width: 100%;
            background: #38bdf8;
            color: #0f172a;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.3s ease, transform 0.1s ease;
        }

        .btn-contact:hover {
            background: #7dd3fc;
        }

        .btn-contact:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-container">
            <div class="avatar">ER</div>
        </div>
        
        <h1>Eki Rohimat</h1>
        <div class="tag">Pegawai Pemerintah dengan Perjanjian Kerja (PPPK)</div>
        
        <p class="bio">
            Mengabdi dengan integritas dalam ruang lingkup administrasi dan pelayanan publik. Berdedikasi untuk memberikan kontribusi terbaik, efisien, dan profesional setiap harinya.
        </p>

        <a href="mailto:email-anda@domain.com" class="btn-contact">Hubungi Saya</a>
    </div>

</body>
</html>
